org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
android.useAndroidX=true
android.enableJetifier=true

# Disabled: Kotlin's incremental compiler cache tries to compute relative
# paths between the pub cache (C:\Users\rayne\AppData\Local\Pub\Cache) and
# this project (D:\AppProjects\kilatspeak). Since these are on different
# Windows drive letters, there is no valid relative path between them,
# which crashes the compiler with "this and base files have different
# roots". Disabling incremental compilation avoids that path calculation
# entirely. Trade-off: slightly slower rebuilds (more gets recompiled each
# time) in exchange for builds actually completing.
kotlin.incremental=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
